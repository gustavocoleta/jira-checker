name: Release Extension

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libglib2.0-dev-bin zip

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: bash scripts/upgrade-version.sh -${{ github.event.inputs.version_type }}

      - name: Read new version
        id: version
        run: |
          VERSION=$(grep '"version"' metadata.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build extension ZIP
        run: make pack

      - name: Commit and push version bump
        run: |
          git add metadata.json package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            "jira-checker@gustavocoleta.zip"

      - name: Publishing summary
        run: |
          echo "## Release ${{ steps.version.outputs.tag }} created :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Release:** $(gh release view ${{ steps.version.outputs.tag }} --json url -q .url)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Publish to GNOME Extensions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "GNOME Extensions does not have a public upload API — manual submission is required:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`jira-checker@gustavocoleta.zip\` from the release assets" >> $GITHUB_STEP_SUMMARY
          echo "2. Go to [extensions.gnome.org/upload](https://extensions.gnome.org/upload/)" >> $GITHUB_STEP_SUMMARY
          echo "3. Upload the ZIP and submit for review" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
